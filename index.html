<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rainy Milk</title>
  <meta property="og:title" content="Rainy Milk">
  <meta property="og:description" content="ミルキーフロッグ ノベルゲーム">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%232d1b35'/%3E%3Cellipse cx='256' cy='295' rx='140' ry='118' fill='%236aaa6a'/%3E%3Cellipse cx='256' cy='208' rx='108' ry='95' fill='%236aaa6a'/%3E%3Ccircle cx='210' cy='192' r='35' fill='%23f5f0ff'/%3E%3Ccircle cx='302' cy='192' r='35' fill='%23f5f0ff'/%3E%3C/svg%3E" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="title-screen">
    <div id="title-bg"></div>
    <div id="title-content">
      <h1 id="title-logo">Rainy Milk</h1>
      <p id="title-sub">ミルキーフロッグと雨の午後</p>
      <button id="start-btn" onclick="startGame()">は じ め る</button>
    </div>
  </div>

  <div id="game-screen">
    <div id="bg-layer"></div>
    <div id="sprite-layer">
      <img id="sprite-milka" class="sprite" src="" alt="">
    </div>
    <div id="cg-layer">
      <img id="cg-img" src="" alt="">
    </div>
    <div id="fade-overlay"></div>
    <div id="textbox">
      <div id="name-plate"></div>
      <div id="text-content"></div>
      <div id="next-arrow">▼</div>
    </div>
    <div id="choices-container"></div>
  </div>

  <script src="js/script.js"></script>
  <script src="js/engine.js"></script>
</body>
</html>
